# CI — valida typecheck, lint e testes em todo push e PR para main
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: TypeScript strict
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Vitest
        run: pnpm test
